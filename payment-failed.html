<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Payment Failed — Pierre Azar</title>
    <link rel="icon" type="image/png" href="images/photos/img_033.jpg">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { text-align: center; padding: 3rem 2.5rem; max-width: 480px; width: 100%; }
        .icon { width: 72px; height: 72px; border-radius: 50%; background: rgba(231,76,60,.12); border: 2px solid #e74c3c; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; }
        .icon svg { width: 36px; height: 36px; }
        h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: .75rem; }
        p  { color: #aaa; line-height: 1.6; margin-bottom: 1.5rem; }
        .btn { display: inline-block; padding: .75rem 2rem; background: #fff; color: #0a0a0a; border-radius: 4px; font-weight: 600; text-decoration: none; margin: 0 .5rem; transition: opacity .2s; }
        .btn:hover { opacity: .85; }
        .btn-outline { background: transparent; color: #fff; border: 1px solid #555; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#e74c3c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        </div>
        <h1>Payment Not Completed</h1>
        <p>Your payment was not processed. No charge has been made. Please try again or contact us if you need help.</p>
        <div>
            <a href="cinematography-course.html" class="btn">Try Again</a>
            <a href="get-in-touch.html" class="btn btn-outline">Contact Us</a>
        </div>
    </div>
</body>
</html>
