<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Member Login — Pierre Azar</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#0d0d0d;color:#f0f0f0;font-family:Arial,sans-serif;
      min-height:100vh;display:flex;flex-direction:column;}
    header{display:flex;align-items:center;justify-content:space-between;
      padding:18px 5%;border-bottom:1px solid #1e1e1e;}
    .logo{font-size:13px;font-weight:700;letter-spacing:.12em;color:#fff;
      text-decoration:none;}
    .logo span{font-size:18px;letter-spacing:.15em;}
    main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 5%;}
    .card{background:#111;border:1px solid #1e1e1e;border-radius:8px;
      padding:36px 32px;width:100%;max-width:400px;}
    .tabs{display:flex;gap:0;margin-bottom:28px;border-bottom:1px solid #222;}
    .tab{flex:1;text-align:center;padding:10px;font-size:13px;font-weight:700;
      letter-spacing:.08em;cursor:pointer;color:#555;border-bottom:2px solid transparent;
      transition:color .2s,border-color .2s;}
    .tab.active{color:#fff;border-bottom-color:#fff;}
    h2{font-size:16px;font-weight:700;letter-spacing:.08em;margin-bottom:6px;}
    .sub{font-size:13px;color:#666;margin-bottom:24px;line-height:1.6;}
    .field{margin-bottom:16px;}
    label{display:block;font-size:12px;color:#888;letter-spacing:.06em;
      text-transform:uppercase;margin-bottom:6px;}
    input{width:100%;background:#0d0d0d;border:1px solid #2a2a2a;border-radius:4px;
      padding:10px 14px;font-size:14px;color:#f0f0f0;outline:none;transition:border-color .2s;}
    input:focus{border-color:#555;}
    .btn{width:100%;background:#fff;color:#000;font-weight:700;font-size:14px;
      padding:12px;border:none;border-radius:4px;cursor:pointer;letter-spacing:.06em;
      transition:opacity .2s;margin-top:4px;}
    .btn:hover{opacity:.85;}
    .btn:disabled{opacity:.5;cursor:default;}
    .msg{margin-top:14px;font-size:13px;line-height:1.5;padding:10px 14px;
      border-radius:4px;display:none;}
    .msg.error{background:#1a1210;border:1px solid #4a2c1a;color:#c87941;}
    .msg.success{background:#0d1a10;border:1px solid #1a4a2c;color:#5ab87e;}
    footer{text-align:center;padding:20px;font-size:12px;color:#444;
      border-top:1px solid #1a1a1a;}
    footer a{color:#555;}
  </style>
</head>
<body>

<header>
  <a href="/" class="logo">PA <span>PIERRE AZAR</span></a>
</header>

<main>
  <div class="card">

    <div class="tabs">
      <div class="tab active" id="tab-login" onclick="showTab('login')">LOG IN</div>
      <div class="tab" id="tab-register" onclick="showTab('register')">SIGN UP</div>
    </div>

    <!-- Login form -->
    <div id="form-login">
      <h2>MEMBER LOGIN</h2>
      <p class="sub">Access the cinematography course and member content.</p>
      <div class="field">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="your@email.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn" id="btn-login" onclick="doLogin()">LOG IN</button>
      <div class="msg" id="msg-login"></div>
    </div>

    <!-- Register form -->
    <div id="form-register" style="display:none;">
      <h2>CREATE ACCOUNT</h2>
      <p class="sub">Register to access the cinematography course.</p>
      <div class="field">
        <label>Name <span style="color:#555;font-weight:400;">(optional)</span></label>
        <input type="text" id="reg-name" placeholder="Your name" autocomplete="name">
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="your@email.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Password <span style="color:#555;font-weight:400;">(min. 8 characters)</span></label>
        <input type="password" id="reg-password" placeholder="••••••••" autocomplete="new-password">
      </div>
      <button class="btn" id="btn-register" onclick="doRegister()">CREATE ACCOUNT</button>
      <div class="msg" id="msg-register"></div>
    </div>

  </div>
</main>

<footer>
  <a href="/">← Back to pierreazar.com</a>
</footer>

<script>
  // Redirect if already logged in (but not if we just logged out)
  if (!new URLSearchParams(location.search).get('logout')) {
    fetch('/member/me').then(function(r){ return r.json(); }).then(function(d){
      if (d.ok) {
        var redir = new URLSearchParams(location.search).get('next') || '/course';
        location.href = redir;
      }
    }).catch(function(){});
  }

  function showTab(tab) {
    document.getElementById('form-login').style.display    = tab === 'login'    ? '' : 'none';
    document.getElementById('form-register').style.display = tab === 'register' ? '' : 'none';
    document.getElementById('tab-login').classList.toggle('active',    tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  }

  function showMsg(id, text, type) {
    var el = document.getElementById(id);
    el.textContent = text;
    el.className = 'msg ' + type;
    el.style.display = 'block';
  }

  function doLogin() {
    var email    = document.getElementById('login-email').value.trim();
    var password = document.getElementById('login-password').value;
    var btn      = document.getElementById('btn-login');
    if (!email || !password) { showMsg('msg-login', 'Please fill in all fields.', 'error'); return; }
    btn.disabled = true;
    btn.textContent = 'Logging in…';
    fetch('/member/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email: email, password: password})
    })
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (d.ok) {
        showMsg('msg-login', 'Login successful. Redirecting…', 'success');
        var redir = new URLSearchParams(location.search).get('next') || '/course';
        setTimeout(function(){ location.href = redir; }, 600);
      } else {
        showMsg('msg-login', d.error || 'Login failed.', 'error');
        btn.disabled = false;
        btn.textContent = 'LOG IN';
      }
    })
    .catch(function(){
      showMsg('msg-login', 'Network error. Please try again.', 'error');
      btn.disabled = false;
      btn.textContent = 'LOG IN';
    });
  }

  function doRegister() {
    var name     = document.getElementById('reg-name').value.trim();
    var email    = document.getElementById('reg-email').value.trim();
    var password = document.getElementById('reg-password').value;
    var btn      = document.getElementById('btn-register');
    if (!email || !password) { showMsg('msg-register', 'Email and password are required.', 'error'); return; }
    if (password.length < 8)  { showMsg('msg-register', 'Password must be at least 8 characters.', 'error'); return; }
    btn.disabled = true;
    btn.textContent = 'Creating account…';
    fetch('/member/register', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name: name, email: email, password: password})
    })
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (d.ok) {
        showMsg('msg-register', 'Account created! Redirecting to the course…', 'success');
        setTimeout(function(){ location.href = '/course'; }, 800);
      } else {
        showMsg('msg-register', d.error || 'Registration failed.', 'error');
        btn.disabled = false;
        btn.textContent = 'CREATE ACCOUNT';
      }
    })
    .catch(function(){
      showMsg('msg-register', 'Network error. Please try again.', 'error');
      btn.disabled = false;
      btn.textContent = 'CREATE ACCOUNT';
    });
  }

  // Allow Enter key to submit
  document.addEventListener('keydown', function(e){
    if (e.key !== 'Enter') return;
    var loginVisible = document.getElementById('form-login').style.display !== 'none';
    if (loginVisible) doLogin(); else doRegister();
  });
</script>

</body>
</html>
